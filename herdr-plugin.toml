id = "herdr-todo"
name = "Herdr TODO"
version = "0.1.0"
description = "Interactive Markdown TODO viewer for Herdr"
min_herdr_version = "0.7.0"
platforms = ["macos", "linux"]

[[panes]]
id = "todo"
title = "TODO"
placement = "split"
command = [
  "sh",
  "-c",
  "exec \"$HERDR_PLUGIN_ROOT/target/release/herdr-todo\""
]

[[actions]]
id = "open"
title = "Open TODO"
command = [
  "sh",
  "-c",
  "exec \"$HERDR_PLUGIN_ROOT/scripts/open-todo.sh\""
]

[[build]]
command = ["cargo", "build", "--release"]
